# Application services — start Fabric test-network on the host first.
# See README.md for full bootstrap order.

services:
  fabric-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.fabric-gateway
    ports:
      - "5000:5000"
    environment:
      FABRIC_SERVICE_PORT: 5000
      FABRIC_CCP_PATH: /app/config/connection-org1.json
      FABRIC_WALLET_PATH: /app/wallet
      CHANNEL_NAME: mychannel
      CHAINCODE_NAME: referendum
      FABRIC_DISCOVERY_AS_LOCALHOST: "true"
    volumes:
      - ../config/connection-org1.json:/app/config/connection-org1.json:ro
      - ../fabric_service/wallet:/app/wallet:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      FABRIC_SERVICE_URL: http://fabric-gateway:5000
    depends_on:
      - fabric-gateway
    volumes:
      - backend_data:/app/db

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  backend_data:
